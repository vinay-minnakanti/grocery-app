# =====================================================
# Secret Store - Connects to AWS Secrets Manager
# =====================================================
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: grocery-app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # Change to your AWS region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# =====================================================
# External Secret - Sync from k8s-secrets in AWS
# This will create a Kubernetes secret with all values from AWS
# =====================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grocery-app-secrets
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    # Database Credentials
    - secretKey: DB_HOST
      remoteRef:
        key: k8s-secrets
        property: DB_HOST
    
    - secretKey: DB_USER
      remoteRef:
        key: k8s-secrets
        property: DB_USER
    
    - secretKey: DB_PASSWORD
      remoteRef:
        key: k8s-secrets
        property: DB_PASSWORD
    
    - secretKey: DB_NAME
      remoteRef:
        key: k8s-secrets
        property: DB_NAME
    
    # JWT Secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: k8s-secrets
        property: JWT_SECRET
    
    # Docker Hub Auth
    - secretKey: DOCKER_HUB_AUTH
      remoteRef:
        key: k8s-secrets
        property: DOCKER_HUB_AUTH

---
# =====================================================
# External Secret - Docker Hub Credentials
# Creates the docker-registry secret type for image pulls
# =====================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-hub-credentials
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: docker-hub-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockercfg
      data:
        .dockercfg: |
          {
            "docker.io": {
              "auth": "{{ .DOCKER_HUB_AUTH }}"
            }
          }
  data:
    - secretKey: DOCKER_HUB_AUTH
      remoteRef:
        key: k8s-secrets
        property: DOCKER_HUB_AUTH

---
# =====================================================
# External Secret - Database Credentials
# Creates a Kubernetes secret with database info
# =====================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grocery-db-credentials
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: grocery-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: k8s-secrets
        property: DB_HOST
    
    - secretKey: DB_USER
      remoteRef:
        key: k8s-secrets
        property: DB_USER
    
    - secretKey: DB_PASSWORD
      remoteRef:
        key: k8s-secrets
        property: DB_PASSWORD
    
    - secretKey: DB_NAME
      remoteRef:
        key: k8s-secrets
        property: DB_NAME
