# =====================================================
# Secret Store - Connects to AWS Secrets Manager
# =====================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: grocery-app
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # Change to your AWS region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# =====================================================
# External Secret - Docker Hub Credentials
# =====================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: docker-hub-credentials
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: docker-hub-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "docker.io": {
                "auth": "{{ .DOCKER_HUB_AUTH }}"
              }
            }
          }
  data:
    - secretKey: DOCKER_HUB_AUTH
      remoteRef:
        key: DOCKER_HUB_AUTH

---
# =====================================================
# External Secret - Database Credentials
# =====================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grocery-db-credentials
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: grocery-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: DB_HOST
    - secretKey: DB_USER
      remoteRef:
        key: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: DB_PASSWORD
    - secretKey: DB_NAME
      remoteRef:
        key: DB_NAME

---
# =====================================================
# External Secret - JWT Secret
# =====================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: grocery-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: JWT_SECRET
